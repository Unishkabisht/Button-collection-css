<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Button Collection</title>
  <link rel="stylesheet" href="./buttons.css" />
</head>
<body>

  <h2>Basic Styles</h2>
  <div class="row">
    <button class="solid">Solid</button>
    <button class="outline">Outline</button>
    <button class="pill">Pill</button>
    <button class="ghost">Ghost</button>
  </div>

  <h2>More Variants</h2>
  <div class="row">
    <button class="dark">Dark</button>
    <button class="beige">Beige</button>
    <button class="icon">★ Icon</button>
    <button class="underline-btn">Underline</button>
  </div>

  <h2>Size Variants</h2>
  <div class="row">
    <button class="small">Small</button>
    <button class="solid">Normal</button>
    <button class="wide">Wide</button>
  </div>

</body>
