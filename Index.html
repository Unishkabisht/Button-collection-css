<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Button Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: #1a0f0a;
      font-family: 'Segoe UI', sans-serif;
      padding: 40px 20px;
    }

    h2 {
      color: #a07850;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 22px;
      font-size: 0.88rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    /* 1. Solid */
    .solid { background: #8B4513; color: #f5e6d3; border-color: #8B4513; }
    .solid:hover { background: #6b3410; border-color: #6b3410; transform: translateY(-2px); }

    /* 2. Outline */
    .outline { background: transparent; color: #8B4513; border-color: #8B4513; }
    .outline:hover { background: #8B4513; color: #f5e6d3; transform: translateY(-2px); }

    /* 3. Pill */
    .pill { background: #c4956a; color: #1a0f0a; border-color: #c4956a; border-radius: 999px; }
    .pill:hover { background: #a07850; border-color: #a07850; transform: translateY(-2px); }

    /* 4. Ghost */
    .ghost { background: transparent; color: #f5e6d3; border-color: #f5e6d3; }
    .ghost:hover { background: #f5e6d3; color: #1a0f0a; transform: translateY(-2px); }

    /* 5. Dark */
    .dark { background: #0d0704; color: #c4956a; border-color: #5c3317; }
    .dark:hover { background: #2c1810; border-color: #8B4513; transform: translateY(-2px); }

    /* 6. Beige filled */
    .beige { background: #f5e6d3; color: #2c1810; border-color: #f5e6d3; }
    .beige:hover { background: #e8d5be; border-color: #e8d5be; transform: translateY(-2px); }

    /* 7. Icon style */
    .icon { background: #5c3317; color: #f5e6d3; border-color: #5c3317; border-radius: 50px; padding: 10px 20px; }
    .icon:hover { background: #8B4513; border-color: #8B4513; transform: translateY(-2px); }

    /* 8. Underline */
    .underline-btn { background: transparent; color: #c4956a; border: none; border-bottom: 2px solid #c4956a; border-radius: 0; padding: 8px 4px; }
    .underline-btn:hover { color: #f5e6d3; border-bottom-color: #f5e6d3; }

    /* 9. Wide */
    .wide { background: #8B4513; color: #f5e6d3; border-color: #8B4513; padding: 10px 60px; }
    .wide:hover { background: #6b3410; transform: translateY(-2px); }

    /* 10. Small */
    .small { background: #c4956a; color: #1a0f0a; border-color: #c4956a; padding: 6px 14px; font-size: 0.75rem; }
    .small:hover { background: #a07850; transform: translateY(-2px); }
  </style>
</head>
<body>

  <h2>Basic Styles</h2>
  <div class="row">
    <button class="solid">Solid</button>
    <button class="outline">Outline</button>
    <button class="pill">Pill</button>
    <button class="ghost">Ghost</button>
  </div>

  <h2>More Variants</h2>
  <div class="row">
    <button class="dark">Dark</button>
    <button class="beige">Beige</button>
    <button class="icon">★ Icon</button>
    <button class="underline-btn">Underline</button>
  </div>

  <h2>Size Variants</h2>
  <div class="row">
    <button class="small">Small</button>
    <button class="solid">Normal</button>
    <button class="wide">Wide</button>
  </div>

</body>
</html>
